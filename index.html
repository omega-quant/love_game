<!DOCTYPE html>
<html>
<head>
  <title>Love Runner ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen">
  <h1>❤️ Love Runner</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="hud">Score: 0</div>

<canvas id="gameCanvas"></canvas>

<div id="gameOverScreen" class="screen hidden">
  <h1>💔 Game Over</h1>
  <button onclick="restartGame()">Restart</button>
</div>

<div id="winScreen" class="screen hidden">
  <h1>💖 Together Forever 💖</h1>
  <button onclick="restartGame()">Play Again</button>
</div>

<!-- MOBILE CONTROLS -->
<div id="controls">
  <button ontouchstart="startMove('ArrowUp')" ontouchend="stopMove('ArrowUp')">⬆</button>
  <div>
    <button ontouchstart="startMove('ArrowLeft')" ontouchend="stopMove('ArrowLeft')">⬅</button>
    <button ontouchstart="startMove('ArrowRight')" ontouchend="stopMove('ArrowRight')">➡</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
